  <head>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script src="lib/ace.js" type="text/javascript" charset="utf-8"></script>
    <script src="lib/d3.js" type="text/javascript" charset="utf-8"></script>

    <script src="../src/underscore.js" type="text/javascript" charset="utf-8"></script>
    <script src="../src/omnom.js" type="text/javascript" charset="utf-8"></script>
    <title>Om Nom</title>
  </head>

  <body>
    <div id="input"></div>
    <div id="grammar"></div>
    <div id="tree"></div>
  </body>

  <script>
	var LOG = console.log

	var Range = ace.require("ace/range").Range;

    var grammar = ace.edit("grammar")
    grammar.setTheme("ace/theme/solarized_dark")
    grammar.getSession().setMode("ace/mode/text")
	grammar.getSession().setNewLineMode("unix")		// GET TEXT FROM EDITOR WITH \n AT END OF LINE

    var input = ace.edit("input")
    input.setTheme("ace/theme/solarized_dark")
    input.getSession().setMode("ace/mode/text")
	input.getSession().setNewLineMode("unix")

    grammar.clearSelection()
    input.clearSelection()

    grammar.setValue(`
// Tokenizer global rules (Regular expressions)

        $ ";[^\\n]*";       // exclude comments
        $ "[ \\t\\r\\n]+";  // exclude spaces
        - "\\d+[a-zA-Z]+";  // disable 123strings

// Terminals (Regular expressions)
symbol  = "[a-zA-Z][\\w-]*\\??|=|\\+|-|\\*|/|<|>";
string  = "\\"([^\\\\\\"]*(\\\\.)?)*\\"";
int     = "\\d+";
float   = "\\d*\\.\\d+|\\d+\\.\\d*";
bool    = "#[tf]";
quote   = "\\'";
op      = "\\(";
cp      = "\\)";

// Parser rules (EBNF expressions)
INPUT       = EXPRESSION*;
EXPRESSION  = ATOM | LIST | LITERAL;
LITERAL     = $quote @EXPRESSION;
ATOM        = symbol | string | int | float | bool;
LIST        = $op EXPRESSION* $cp;
`)

    input.setValue(`
;   ____            _   _                   _
;  / __ \\          | \\ | |                 (_)
; | |  | |_ __ ___ |  \\| | ___  _ __ ___    _ ___
; | |  | | '_ \` _ \\| . \` |/ _ \\| '_ \` _ \\  | / __|
; | |__| | | | | | | |\\  | (_) | | | | | |_| \\__ \\
;  \\____/|_| |_| |_|_| \\_|\\___/|_| |_| |_(_) |___/
;                                         _/ |
;                A Jank Ass-Parser       |__/
;
; The input BELOW is parsed by the grammar FARTHER
; BELOW to generate the tree on the LEFT.
;
; WAT.

(define divides?
  (lambda (x y)
    (= (modulo y x) 0)))

(define divisors
  (lambda (x)
    (filter
      (lambda (y) (divides? y x))
      (range 2 (+ (sqrt x) 1)))))

(define prime?
  (lambda (x)
    (empty? (divisors x))))

(filter prime? (range 2 100))
`
)

  </script>

  <script>
    var parser, errorMarkerId = null, errorMarkerId2 = null

    var getPos = function (index, text) {
      var row = 0
      var col = 0
      for (var i = 0; i < index; i++) {
        col++
        if (text.charAt(i) == "\n") {
          row++
          col = 0
        }
      }
      return {row:row, col:col}
    }

    var updateGrammar = function () {
      grammar.getSession().clearAnnotations()

    if(errorMarkerId2 != null)
    {
      grammar.getSession().removeMarker(errorMarkerId2)
      errorMarkerId2 = null
    }

	try { parser = OMNOMGrammarParser(320, grammar.getValue()) }
      catch (e) {
        d3.select("#tree").classed("error", true)
        var pos = getPos(e.start, grammar.getValue())
        grammar.getSession().setAnnotations([{
          type: "error",
          row:  pos.row,
          text: e.type + " Error at row/col = " + (pos.row+1) + ":" + (pos.col+1),
          html: e.type + " Error at row/col = " + (pos.row+1) + ":" + (pos.col+1),
        }])

        var errorRange = new Range(pos.row, pos.col, pos.row, pos.col + 1)
        errorMarkerId2 = grammar.getSession().addMarker(errorRange, "error-marker", "text")
        return
      }

      updateInput()
    }

    var updateInput = function () {

      input.getSession().clearAnnotations()

      var tree = parser(input.getValue())

      if(errorMarkerId != null)
      {
          input.getSession().removeMarker(errorMarkerId)
          errorMarkerId = null
      }

      if (tree.error) {
        d3.select("#tree").classed("error", true)
        var pos = getPos(tree.error.start, input.getValue())
        input.getSession().setAnnotations([{
          type: "error",
          row:  pos.row,
          text: tree.error.type + " Error at row/col = " + (pos.row+1) + ":" + (pos.col+1),
          html: tree.error.type + " Error at row/col = " + (pos.row+1) + ":" + (pos.col+1),
        }])
        var errorRange = new Range(pos.row, pos.col, pos.row, pos.col + 1)
        errorMarkerId = input.getSession().addMarker(errorRange, "error-marker", "text")
        return
      }

      d3.select("#tree").classed("error", false)
      d3.select("#tree").html("<ul><li><a class='symbol'>INPUT</a><ul></ul></li></ul>")
      renderChildren(tree.children, d3.select("#tree ul li ul").selectAll("li"))
    }

    var renderChildren = function (children, nodes) {
      var nodes = nodes.data(children)
      var enter = nodes.enter().append("li")
      var exit  = nodes.exit().remove()

      enter.append("a")
        .attr("class", function (c) { return c.text ? "token" : "symbol" })
        .html(function (c) { return c.text ? nice(c.text) : c.symbol })

      enter.append("ul")

      nodes
        .each(function (c) { renderChildren(c.children || [], d3.select(this).select("ul").selectAll("li")) })
    }

    var nice = function (s) {
      return s
        .replace("\n", "\\n")
        .replace("\t", "\\t")
        .replace("<", "&lt;")
        .replace(">", "&gt;")
    }

    grammar.getSession().on("change", updateGrammar)
    input.getSession().on("change", updateInput)
    updateGrammar()
  </script>

</html>
